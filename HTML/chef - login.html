<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Login</title>
</head>
<body>
    <h1>Chef Login</h1>
    <form>
        <label for="chef-name">Name:</label>
        <input type="text" id="chef-name" name="chef-name" required>
        <br><br>
        <label for="chef-password">Password:</label>
        <input type="password" id="chef-password" name="chef-password" required>
        <br><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
